title: Vector → Hybrid → Do You Even Need a Model?
teaser: |
  Build a production-grade hybrid search pipeline — vector + BM25 + RRF — and prove that retrieval quality, not model quality, determines answer quality in RAG systems.
description: |
  In this 2-hour hands-on workshop you'll go from pure vector search to a production hybrid
  retriever, learning exactly where each approach succeeds and fails.

  The thesis: in RAG, retrieval quality — not the model — determines answer quality.

  - Lab 1 — Vector Search: run semantic queries and see how Elastic generates embeddings
    (Jina v5, server-side) to match on meaning, not keywords. No client-side embedding code.
  - Lab 2 — Where Vector Breaks: find the queries that break semantic AND the ones that break
    BM25 — and read the scores to see why neither is safe alone.
  - Lab 3 — Hybrid Search: fuse BM25 + semantic with RRF (and linear) into one retriever that
    wins on every query type that broke the others.
  - Lab 4 — Why It Matters: wire hybrid retrieval to an LLM and prove that same model + worse
    retrieval = worse answer. "The model didn't get dumber. The retrieval got worse."

  By the end you can build and tune a production hybrid retriever, explain why each method
  fails where it does, and show that retrieval — not the model — is where RAG answer quality
  is won. You leave with a reference GitHub repo: pre-baked corpus, ingest script, all Dev
  Console snippets, and working Python notebooks for all four labs.
