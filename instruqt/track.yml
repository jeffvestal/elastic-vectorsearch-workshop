slug: aiewf-2026-vector-hybrid-search
id: aiewf2026vhs
title: "Vector → Hybrid → Do You Even Need a Model?"
teaser: >
  Build a production-grade hybrid search pipeline — vector + BM25 + RRF — and prove that
  retrieval quality, not model quality, determines answer quality in RAG systems.
description: |
  In this 2-hour hands-on workshop you'll go from pure vector search to a production hybrid
  retriever, learning exactly where each approach succeeds and fails.

  The thesis: most of a RAG pipeline is a database problem, not a model problem.

  - Challenge 1: Vector Search — run semantic queries, learn how Elastic Inference Service
    (EIS) generates embeddings server-side via Jina v5. No client-side embedding code.
  - Challenge 2: Where Vector Breaks — adversarial queries that expose pure vector's blind
    spots. BM25 rescue. Then BM25's own vocabulary-mismatch gap.
  - Challenge 3: Hybrid Search — compose BM25 + semantic under an RRF retriever, then a
    linear retriever with MinMax normalization. Build the retriever that wins on all query types.
  - Challenge 4: Why It Matters for Agents — wire the hybrid retriever to an LLM synthesis
    call. Compare good context vs. bad context. "The model didn't get dumber. The retrieval got worse."

  Attendees leave with a reference GitHub repo: pre-baked corpus, ingest script, all Dev
  Console snippets, and a working Python RAG notebook.

